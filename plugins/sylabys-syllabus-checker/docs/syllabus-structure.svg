<svg width="100%" viewBox="0 0 680 515" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Эталонная структура силлабуса: источники данных и состав разделов</title>
<desc>Три источника данных (Platonus, Отдел/КУД, ППС) наполняют сущность Syllabus. Тип силлабуса (module или discipline) выбирается первым. Разделы делятся на общие (заполняются один раз) и повторяемые по каждой дисциплине, включая Приложение 1 (КИС) и Приложение 2 (КО).</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Band 1: источники -->
<g class="c-blue"><rect class="box" x="40" y="40" width="180" height="52" rx="6"/></g>
<text class="th" x="130" y="64" text-anchor="middle">Platonus</text>
<text class="ts" x="130" y="82" text-anchor="middle">структура и часы</text>

<g class="c-amber"><rect class="box" x="250" y="40" width="180" height="52" rx="6"/></g>
<text class="th" x="340" y="64" text-anchor="middle">Отдел / КУД</text>
<text class="ts" x="340" y="82" text-anchor="middle">РО ОП, связи, эталон</text>

<g class="c-green"><rect class="box" x="460" y="40" width="180" height="52" rx="6"/></g>
<text class="th" x="550" y="64" text-anchor="middle">ППС</text>
<text class="ts" x="550" y="82" text-anchor="middle">контент силлабуса</text>

<line class="arr" x1="130" y1="92" x2="130" y2="128" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="92" x2="340" y2="128" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="92" x2="550" y2="128" marker-end="url(#arrow)"/>

<!-- Band 2: сущность Syllabus -->
<rect x="40" y="130" width="600" height="112" rx="8" fill="none" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="56" y="152">Сущность Syllabus</text>
<text class="ts" x="56" y="170">тип силлабуса выбирается первым</text>

<g class="c-gray"><rect class="box" x="56" y="184" width="150" height="44" rx="6"/></g>
<text class="t" x="131" y="203" text-anchor="middle">type</text>
<text class="ts" x="131" y="219" text-anchor="middle">module | discipline</text>

<rect class="box" x="330" y="184" width="140" height="44" rx="6"/>
<text class="t" x="400" y="203" text-anchor="middle">module?</text>
<text class="ts" x="400" y="219" text-anchor="middle">обёртка над дисц.</text>

<rect class="box" x="490" y="184" width="140" height="44" rx="6"/>
<text class="t" x="560" y="203" text-anchor="middle">disciplines[]</text>
<text class="ts" x="560" y="219" text-anchor="middle">1…N по типу</text>

<line class="arr" x1="206" y1="206" x2="326" y2="206" marker-end="url(#arrow)"/>
<line class="arr" x1="470" y1="206" x2="486" y2="206" marker-end="url(#arrow)"/>

<line class="arr" x1="200" y1="242" x2="200" y2="280" marker-end="url(#arrow)"/>
<line class="arr" x1="490" y1="242" x2="490" y2="280" marker-end="url(#arrow)"/>

<!-- Band 3: разделы -->
<rect class="box" x="40" y="282" width="300" height="170" rx="6"/>
<text class="th" x="56" y="306">Общие разделы (1 раз)</text>
<text class="ts" x="56" y="330">Титул и общие сведения</text>
<text class="ts" x="56" y="350">Преподаватели</text>
<text class="ts" x="56" y="370">Цель и содержание (модуль — общая)</text>
<text class="ts" x="56" y="390">Политика</text>
<text class="ts" x="56" y="410">Глоссарий / сокращения</text>
<text class="ts" x="56" y="430">Согласование / утверждение</text>

<rect class="box" x="350" y="282" width="290" height="170" rx="6"/>
<text class="th" x="366" y="306">По каждой дисциплине</text>
<text class="ts" x="366" y="328">Описание (часы, реквизиты)</text>
<text class="ts" x="366" y="346">РО → программные РО ОП</text>
<text class="ts" x="366" y="364">Практические навыки (ПН)</text>
<text class="ts" x="366" y="382">Тематический план (матрица)</text>
<text class="ts" x="366" y="400">Оценивание (ТК / ПА)</text>
<text class="ts" x="366" y="418">Список литературы</text>
<text class="ts" x="366" y="436">Приложение 1 — КИС · Приложение 2 — КО</text>

<!-- Легенда источников -->
<g class="c-blue"><rect x="40" y="476" width="12" height="12" rx="2"/></g>
<text class="ts" x="58" y="486">Platonus</text>
<g class="c-amber"><rect x="160" y="476" width="12" height="12" rx="2"/></g>
<text class="ts" x="178" y="486">Отдел / КУД</text>
<g class="c-green"><rect x="300" y="476" width="12" height="12" rx="2"/></g>
<text class="ts" x="318" y="486">ППС</text>
<g class="c-gray"><rect x="380" y="476" width="12" height="12" rx="2"/></g>
<text class="ts" x="398" y="486">вычисляется</text>
</svg>
